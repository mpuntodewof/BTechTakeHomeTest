services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "AuthAssess@2024!"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "AuthAssess@2024!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/AuthAssessment.API/Dockerfile
    ports:
      - "5154:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db;Database=AuthAssessmentDb;User Id=sa;Password=AuthAssess@2024!;TrustServerCertificate=true;"
      Jwt__SecretKey: "DockerComposeSecretKeyThatIsAtLeast32Characters!"
      Jwt__Issuer: "AuthAssessment"
      Jwt__Audience: "AuthAssessment"
      Jwt__AccessTokenExpiryMinutes: "15"
      Jwt__RefreshTokenExpiryDays: "7"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: src/client-app
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  sqldata:
